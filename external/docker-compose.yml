version: '3.8'

services:
  mysql:
    image: mysql:8.0.27
    container_name: mysql8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
    volumes:
      - ./mysql/data/mysql:/var/lib/mysql
    restart: always

  redis:
    image: redis:7.2.3
    container_name: redis2
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/etc/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /etc/redis/redis.conf --appendonly yes
    restart: always

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos
    privileged: true
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: "standalone"
      JVM_XMX: "300m"
      JVM_XMS: "300m"
    volumes:
      - ./nacos/conf:/home/nacos/conf
      - ./nacos/data:/home/nacos/data
      - ./nacos/logs:/home/nacos/logs

  minio:
    image: minio/minio:RELEASE.2023-09-30T07-02-29Z
    container_name: minio
    ports:
      - "9001:9000"
      - "9081:9090"
    environment:
      MINIO_ROOT_USER: "mybook"
      MINIO_ROOT_PASSWORD: "qwe123!@#"
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9090"
    restart: always

  cassandra:
    image: cassandra:latest
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - ./cassandra/data:/var/lib/cassandra
      - ./cassandra/config:/etc/cassandra
    restart: always

  zookeeper:
    image: zookeeper:3.5.6
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./zookeeper/data:/data
      - ./zookeeper/conf:/conf
    restart: unless-stopped

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: rocketmq-dashboard
    ports:
      - "8050:8082"
    environment:
      - JAVA_OPTS=-Xmx200M -Xms200M -Xmn100M -Drocketmq.namesrv.addr=rocketmq-namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false
    depends_on:
      - rocketmq-namesrv
      - rocketmq-broker

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: rocketmq-namesrv
    privileged: true
    ports:
      - "9876:9876"
    volumes:
      - ./rocketmq/namesrv/logs:/home/rocketmq/logs
      - ./rocketmq/namesrv/bin/runserver.sh:/home/rocketmq/rocketmq-5.3.1/bin/runserver.sh
    command: sh mqnamesrv
    networks:
      - rocketmq

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: rocketmq-broker
    privileged: true
    ports:
      - "10912:10912"   # 代理（Proxy）端口
      - "10911:10911"   # Broker 服务端口
      - "10909:10909"   # VIP 通道端口（可选）
    volumes:
      - ./rocketmq/broker/logs:/home/rocketmq/logs/rocketmqlogs
      - ./rocketmq/broker/store:/home/rocketmq/store
      - ./rocketmq/broker/config/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf
      - ./rocketmq/broker/bin/runbroker.sh:/home/rocketmq/rocketmq-5.3.1/bin/runbroker.sh
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
    command: sh mqbroker --enable-proxy -c /home/rocketmq/rocketmq-5.3.1/conf/broker.conf
    depends_on:
      - rocketmq-namesrv
    networks:
      - rocketmq

networks:
  rocketmq:
    driver: bridge
    
